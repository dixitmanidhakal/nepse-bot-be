[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -q
    --tb=short
    --strict-markers
    --disable-warnings
markers =
    unit: fast, in-process unit tests
    api: HTTP endpoint tests via TestClient
    integration: cross-module integration tests
    requires_db: tests that need the SQLite historical snapshot
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
